apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
  - ../../components/base-service

patches:
  - target:
      name: base-service
    patch: |
      - op: replace
        path: /metadata/name
        value: site-service

  - target:
      kind: Deployment
      name: base-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: andr7w/saga-orchestration-site-service:latest
      - op: replace
        path: /metadata/labels/app
        value: site-service
      - op: replace
        path: /spec/selector/matchLabels/app
        value: site-service
      - op: replace
        path: /spec/template/metadata/labels/app
        value: site-service
      - op: add
        path: /spec/template/spec/containers/0/envFrom
        value:
          - configMapRef:
              name: site-service-config

  - target:
      kind: Service
      name: base-service
    patch: |
      - op: replace
        path: /metadata/name
        value: site-service
      - op: replace
        path: /spec/selector/app
        value: site-service

  - target:
      kind: Ingress
      name: base-service
    patch: |
      - op: replace
        path: /metadata/name
        value: site-service
      - op: replace
        path: /spec/rules/0/host
        value: site-service.saga-k8s.local
      - op: replace
        path: /spec/rules/0/http/paths/0/backend/service/name
        value: site-service
