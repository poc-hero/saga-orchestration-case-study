apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: saga-k8s-dev

resources:
  - namespace.yaml
  - serviceaccount-default.yaml
  - ../../services/site-service
  - ../../services/uaa-service

configMapGenerator:
  - name: site-service-config
    literals:
      - SITE_SERVICES_UAA_URL=http://uaa-service:8080
      - SERVER_PORT=8080
      - LOG_LEVEL=DEBUG

secretGenerator:
  - name: dockerhub-creds
    type: kubernetes.io/dockerconfigjson
    files:
      - .dockerconfigjson=secrets/dockerconfigjson.dev.json

generatorOptions:
  disableNameSuffixHash: true
