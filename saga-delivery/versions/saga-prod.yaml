# Meme principe que dev : cluster cible = workloads (souvent distinct d'Argo CD).
env: prod
namespace: saga-prod
cluster: cluster-workload
services:
  - name: site-service
    imageTag: "3.0.5"
    replicas: "2"
    ingressHost: site-service.prod.saga-k8s.local
  - name: uaa-service
    imageTag: "1.0.3"
    replicas: "2"
    ingressHost: uaa-service.prod.saga-k8s.local
