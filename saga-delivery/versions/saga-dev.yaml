# Dev : workloads sur le cluster applicatif (ex. API K8s 84.234.26.236), pas sur le cluster ou tourne Argo CD.
# `cluster` = nom enregistre dans Argo CD pour ce cluster (`argocd cluster list` -> destination.name). Pas "in-cluster".
env: dev
namespace: saga-dev
cluster: cluster-workload
services:
  - name: site-service
    imageTag: "4.0.3.prometheus"
    replicas: "1"
    ingressHost: site-service.dev.saga-k8s.local
  - name: uaa-service
    imageTag: "latest"
    replicas: "2"
    ingressHost: uaa-service.dev.saga-k8s.local
