# Profil vault — dev (saga-delivery) : Spring Cloud Vault + paramètres d’accès Mongo (hors profil mongo)
spring:
  config:
    import: optional:vault://
  cloud:
    vault:
      uri: http://84.234.25.73:30200
      authentication: KUBERNETES
      kubernetes:
        role: app-role
        service-account-token-file: /var/run/secrets/kubernetes.io/serviceaccount/token
      kv:
        enabled: true
        backend: secret
        default-context: app/saga/dev/site-service
        application-name: app/saga/dev/site-service


