# ServiceAccount partagée par site-service et uaa-service (values: serviceAccount.name=saga-app).
# Le library chart ne cree plus de SA — ce manifeste garantit son existence dans chaque NS d'env.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: saga-app
  namespace: saga-dev
  labels:
    app.kubernetes.io/part-of: saga
    saga.pocmaster.io/env: dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: saga-app
  namespace: saga-prod
  labels:
    app.kubernetes.io/part-of: saga
    saga.pocmaster.io/env: prod
