replicaCount: 1

image:
  repository: andr7w/saga-orchestration-site-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "traefik"
  host: site-service.saga-k8s.local
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    path: /actuator/health
    initialDelaySeconds: 15
    periodSeconds: 5

serviceAccount:
  name: saga-app

imagePullSecrets: []

vault:
  enabled: false
