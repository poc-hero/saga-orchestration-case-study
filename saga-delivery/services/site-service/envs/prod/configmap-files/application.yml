# Config applicative site-service (prod) — profil par défaut (monté sous /config)
spring:
  application:
    name: site-service

management:
  endpoints:
    web:
      exposure:
        include: health,refresh,prometheus
  prometheus:
    metrics:
      export:
        enabled: true

site:
  services:
    uaa:
      url: http://uaa-service:8080
