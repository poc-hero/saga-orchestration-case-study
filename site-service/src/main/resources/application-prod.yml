# Option B — Spring Cloud Vault (actif uniquement quand SPRING_PROFILES_ACTIVE=prod)
spring:
  config:
    import: optional:vault://
  cloud:
    vault:
      uri: ${VAULT_ADDR}
      authentication: KUBERNETES
      kubernetes:
        role: app-role
        service-account-token-file: /var/run/secrets/kubernetes.io/serviceaccount/token
      kv:
        enabled: true
        backend: secret
        default-context: app/saga/prod/site-service
        application-name: app/saga/prod/site-service
